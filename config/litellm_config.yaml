# LiteLLM Configuration for Team Leader System
# This file configures multiple LLM providers for MCP integration

# Server configuration
host: 0.0.0.0
port: 4000
debug: true

# Model configurations
models:
  # Google Gemini Models
  - model_name: flash-lite
    litellm_params:
      model: gemini-1.5-flash-8b
      api_key: ${GOOGLE_API_KEY}
  
  - model_name: flash
    litellm_params:
      model: gemini-1.5-flash
      api_key: ${GOOGLE_API_KEY}
  
  - model_name: gemini-pro
    litellm_params:
      model: gemini-1.5-pro
      api_key: ${GOOGLE_API_KEY}
  
  # OpenAI Models
  - model_name: gpt-4-nano
    litellm_params:
      model: gpt-4.1-nano
      api_key: ${OPENAI_API_KEY}
  
  - model_name: gpt-4-mini
    litellm_params:
      model: gpt-4.1-mini
      api_key: ${OPENAI_API_KEY}
  
  - model_name: o3
    litellm_params:
      model: o3-2025
      api_key: ${OPENAI_API_KEY}
  
  - model_name: o4-mini
    litellm_params:
      model: o4-mini
      api_key: ${OPENAI_API_KEY}
  
  - model_name: gpt-4o
    litellm_params:
      model: gpt-4o
      api_key: ${OPENAI_API_KEY}
  
  # Anthropic Models
  - model_name: claude-37
    litellm_params:
      model: claude-3.7-sonnet
      api_key: ${ANTHROPIC_API_KEY}
  
  - model_name: opus-4
    litellm_params:
      model: claude-3-opus-20240229
      api_key: ${ANTHROPIC_API_KEY}
  
  - model_name: sonnet-4
    litellm_params:
      model: claude-3-sonnet-20240229
      api_key: ${ANTHROPIC_API_KEY}
  
  # DeepSeek Models
  - model_name: deepseek-v3
    litellm_params:
      model: deepseek-chat
      api_key: ${DEEPSEEK_API_KEY}

# Default settings
default_settings:
  temperature: 0.7
  max_tokens: 4000
  top_p: 0.9

# Rate limiting
rate_limiting:
  enabled: true
  requests_per_minute: 60

# Logging
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Health check endpoint
health_check: true 